mode: ContinuousDeployment
commit-message-incrementing: Enabled

branches:
  main:
    regex: ^main$
    increment: Inherit
    is-release-branch: true
    label: ''
  develop:
    regex: ^develop$
    increment: Inherit
    label: alpha
  release:
    regex: ^release[/-]
    increment: Patch
    is-release-branch: true
    label: beta
  feature:
    regex: ^feature[/-]
    increment: Inherit
    label: useBranchName
  hotfix:
    regex: ^hotfix[/-]
    increment: Patch
    is-release-branch: true
    label: rc
  bugfix:
    regex: ^bugfix[/-]
    increment: Patch
    label: fix
  pull-request:
    regex: ^(pull|pr)[/-]
    increment: Inherit
    label: pr

# Detectar semver desde Conventional Commits
major-version-bump-message: '^(feat|fix|refactor|.*)!:.*|BREAKING CHANGE:'
minor-version-bump-message: '^feat(\(.+\))?:'
patch-version-bump-message: '^fix(\(.+\))?:'
